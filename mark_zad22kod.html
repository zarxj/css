<h1>Zadanie 22 - Użycie ID</h1>

<p> Markowski HTML,HTML jest językiem używanym do tworzenia stron internetowych.<br>                               Za jego pomocą można dodawać nagłówki, akapity, obrazy oraz tabele.<br>                                       Przeglądarka odczytuje znaczniki HTML i wyświetla ich zawartość użytkownikowi.<br>                                 Bez HTML większość stron internetowych nie mogłaby istnieć. </p>

<p id="gruby_markowski"> Markowski CSS, CSS służy do nadawania wyglądu elementom znajdującym się na stronie internetowej.<br> Dzięki niemu można zmieniać kolory, rozmiary tekstu oraz położenie obiektów.<br>             Arkusze stylów pozwalają zachować spójny wygląd całej witryny.<br>                                             Ułatwia to tworzenie estetycznych i czytelnych projektów. </p>

<h1 id="dlawszyskich_markowski"> Markowski Jednym z ważnych zastosowań HTML jest tworzenie formularzy.<br>     Formularze umożliwiają użytkownikom wprowadzanie danych, takich jak imię czy adres e-mail.<br>                     Do budowy formularzy wykorzystuje się specjalne znaczniki, między innymi form oraz input.<br>                    Takie rozwiązanie jest często spotykane na stronach rejestracyjnych i kontaktowych. </h1>

<div id="dlawszyskich_markowski"> Markowski HTML i CSS najczęściej działają razem podczas tworzenia stron internetowych.<br> HTML odpowiada za zawartość, a CSS za jej prezentację wizualną.<br>                          Dzięki temu można łatwo modyfikować wygląd strony bez zmiany jej treści.<br>                                     Takie rozdzielenie funkcji przyspiesza pracę programistów i ułatwia rozwój projektu. </div>
